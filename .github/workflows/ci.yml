name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Download the tempo node binary + genesis
        run: |
          set -euo pipefail
          # Track main, same image as --consensus-docker.
          image="ghcr.io/tempoxyz/tempo:latest"
          dir="$RUNNER_TEMP/tempo"
          mkdir -p "$dir"
          docker pull -q "$image"
          cid=$(docker create "$image")  # the binary only ships inside the image
          docker cp "$cid:/usr/local/bin/tempo" "$dir/tempo"
          docker rm -v "$cid" > /dev/null
          chmod +x "$dir/tempo"
          "$dir/tempo" --version
          echo "TEMPO_BIN=$dir/tempo" >> "$GITHUB_ENV"
          # The matching dev genesis (every hardfork at block 0); not shipped in the image.
          genesis="$dir/test-genesis.json"
          curl -fsSL -o "$genesis" \
            "https://raw.githubusercontent.com/tempoxyz/tempo/main/crates/node/tests/assets/test-genesis.json"
          echo "TEMPO_GENESIS=$genesis" >> "$GITHUB_ENV"

      # The dev-node tests only; the consensus localnet also needs tempo-xtask, which
      # this image does not ship (build from source to run those locally).
      - name: Test
        run: uv run --all-extras pytest -m "not consensus"
